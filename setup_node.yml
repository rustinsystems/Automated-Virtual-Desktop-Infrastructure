---
# This script was made by Rustin Systems
- name: CPUT Remote Lab Setup
  hosts: lab_servers
  become: yes # SUDO PRIVILEGES

  tasks:
    # 1. CLEANUP
    - name: Remove light-locker to prevent xrdp warnings
      apt:
        name: light-locker
        state: absent

    - name: Remove Firefox Snap package to prevent snap error
      community.general.snap:
        name: firefox
        state: absent

    # 2. REPOSITORIES (Brave & Oracle)
    - name: Download Brave Browser GPG key
      get_url:
        url: https://brave-browser-apt-release.s3.brave.com/brave-browser-archive-keyring.gpg
        dest: /usr/share/keyrings/brave-browser-archive-keyring.gpg
        mode: '0644'

    - name: Add Brave repository
      apt_repository:
        repo: "deb [arch=amd64 signed-by=/usr/share/keyrings/brave-browser-archive-keyring.gpg] https://brave-browser-apt-release.s3.brave.com/ stable main"
        filename: brave-browser-release
        state: present

    - name: Download Oracle VirtualBox GPG key
      shell: wget -O- https://www.virtualbox.org/download/oracle_vbox_2016.asc | gpg --dearmor --yes --output /usr/share/keyrings/oracle-virtualbox-2016.gpg
      args:
        creates: /usr/share/keyrings/oracle-virtualbox-2016.gpg

    - name: Add Oracle VirtualBox repository
      apt_repository:
        repo: "deb [arch=amd64 signed-by=/usr/share/keyrings/oracle-virtualbox-2016.gpg] https://download.virtualbox.org/virtualbox/debian {{ ansible_distribution_release }} contrib"
        filename: virtualbox
        state: present

    # 3. KERNEL DOWNGRADE & INSTALLATIONS
    - name: Update apt cache and install core packages
      apt:
        name:
          - xrdp
          - xfce4
          - xfce4-goodies
          - build-essential
          - dkms
          - linux-image-generic
          - linux-headers-generic
          - virtualbox-7.0
          - brave-browser
        state: present
        update_cache: yes

    # 3.5 KERNEL DOWNGRADE (For kernel 6.17)
    - name: Purge the incompatible 6.17 kernel and its headers
      apt:
        name:
          - 'linux-image-6.17.*'
          - 'linux-headers-6.17.*'
          - 'linux-modules-6.17.*'
        state: absent
        purge: yes
      notify: update grub

    # 4. GRUB BOOTLOADER LOCK (Kernel Pin)
    - name: Configure GRUB to save the default kernel selection
      lineinfile:
        path: /etc/default/grub
        regexp: "^{{ item.key }}="
        line: "{{ item.key }}={{ item.value }}"
      loop:
        - { key: 'GRUB_DEFAULT', value: 'saved' }
        - { key: 'GRUB_SAVEDEFAULT', value: 'true' }
        - { key: 'GRUB_TIMEOUT', value: '5' }
      notify: update grub

    # 5. BROWSER CONFIGURATION (Keyring removal)
    - name: Fix Brave keyring issue in desktop shortcut
      lineinfile:
        path: /usr/share/applications/brave-browser.desktop
        regexp: '^Exec=/usr/bin/brave-browser-stable %U'
        line: 'Exec=/usr/bin/brave-browser-stable --password-store=basic %U'
        backrefs: yes

    # 6. SHARED DIRECTORY
    - name: Create shared directory for ISOs and Lab Files
      file:
        path: /opt/shared_lab_files
        state: directory
        mode: '0775'
        owner: root
        group: sudo   # Grants write access to all admin accounts

    # - name: Copy Ubuntu Server ISO (UNCOMMENT FOR ISO COPY, HAVE THE ISO IN THE ROOT DIRECTORY)
    #   copy:
    #     src: ubuntu-24.04.4-desktop-amd64.iso
    #     dest: /opt/shared_lab_files/ubuntu-server-24.04.iso
    #     owner: root
    #     group: sudo
    #     mode: '0664'

    # 7. DEFAULT XFCE & XRDP SETTINGS
    - name: Copy CPUT wallpaper to global backgrounds
      copy:
        src: cputwallpaper.png
        dest: /usr/share/backgrounds/cputwallpaper.png
        owner: root
        group: root
        mode: '0644'

    - name: Ensure /etc/skel/.config exists
      file:
        path: /etc/skel/.config
        state: directory
        owner: root
        group: root
        mode: '0755'

    - name: Copy XFCE configuration to Skeleton Directory
      copy:
        src: xfce4/
        dest: /etc/skel/.config/xfce4/
        owner: root
        group: root
        mode: '0755'
        directory_mode: '0755'

    - name: Copy xrdp session trigger to Skeleton Directory
      copy:
        src: .xsession
        dest: /etc/skel/.xsession
        owner: root
        group: root
        mode: '0644'

    # 7.5 THE DEFAULT STUDENT IMAGE (Pin Apps and Shared Folder to Desktop)
    - name: Ensure Desktop folder exists in Skeleton
      file:
        path: /etc/skel/Desktop
        state: directory
        owner: root
        group: root
        mode: '0755'

    - name: Pin Brave Browser to Desktop
      copy:
        src: /usr/share/applications/brave-browser.desktop
        dest: /etc/skel/Desktop/brave-browser.desktop
        remote_src: yes
        owner: root
        group: root
        mode: '0755'

    - name: Pin VirtualBox to Desktop
      copy:
        src: /usr/share/applications/virtualbox.desktop
        dest: /etc/skel/Desktop/virtualbox.desktop
        remote_src: yes
        owner: root
        group: root
        mode: '0755'

    - name: Pin Shared Folder to Desktop
      file:
        src: /opt/shared_lab_files
        dest: /etc/skel/Desktop/Shared_Lab_Files
        state: link

    # 8. MANAGEMENT TOOLS
    - name: Install Rustin Systems Lab Manager tool
      copy:
        src: manage_lab_users.sh
        dest: /usr/local/bin/manage_lab_users
        owner: root
        group: root
        mode: '0755'

    # 9. SECURITY MEASURES (UFW AND FAIL2BAN)
    - name: Install Security Packages (UFW & Fail2ban)
      apt:
        name:
          - ufw
          - fail2ban
        state: present

    - name: Configure UFW to allow SSH and XRDP
      ufw:
        rule: allow
        port: "{{ item }}"
        proto: tcp
      loop:
        - '22'    # Standard SSH port
        - '3389'  # Standard XRDP port

    - name: Enable UFW Firewall
      ufw:
        state: enabled
        policy: deny

    - name: Configure Fail2ban to mitigate SSH Brute Force attacks
      copy:
        dest: /etc/fail2ban/jail.local
        content: |
          [sshd]
          enabled = true
          port = ssh
          filter = sshd
          logpath = /var/log/auth.log
          maxretry = 5
          bantime = 3600
      notify: restart fail2ban

  handlers:
    - name: update grub
      command: update-grub

    - name: restart fail2ban
      service:
        name: fail2ban
        state: restarted
