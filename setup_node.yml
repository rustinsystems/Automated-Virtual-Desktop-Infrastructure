---
- name: CPUT Remote Lab Setup (Ubuntu 24.04 VDI)
  hosts: lab_servers
  become: true

  vars:
    # Compatibility baseline (adjust as VirtualBox/kernel compatibility evolves)
    supported_ubuntu_release: "noble"
    virtualbox_version: "7.0"
    allowed_tcp_ports:
      - "22"
      - "3389"

  pre_tasks:
    - name: Validate Ubuntu release
      ansible.builtin.assert:
        that:
          - ansible_distribution == "Ubuntu"
          - ansible_distribution_release == supported_ubuntu_release
        fail_msg: >
          This playbook is tested for Ubuntu 24.04 ({{ supported_ubuntu_release }}) only.
          Current target: {{ ansible_distribution }} {{ ansible_distribution_release }}.

  tasks:
    # 1) CLEANUP
    - name: Remove light-locker to prevent XRDP warnings
      ansible.builtin.apt:
        name: light-locker
        state: absent
        purge: true

    - name: Remove Firefox snap package (if present)
      community.general.snap:
        name: firefox
        state: absent
      failed_when: false

    # 2) REPOSITORIES
    - name: Install apt prerequisites
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - gpg
          - wget
          - software-properties-common
        state: present
        update_cache: true

    - name: Download Brave Browser GPG key
      ansible.builtin.get_url:
        url: https://brave-browser-apt-release.s3.brave.com/brave-browser-archive-keyring.gpg
        dest: /usr/share/keyrings/brave-browser-archive-keyring.gpg
        mode: "0644"

    - name: Add Brave repository
      ansible.builtin.apt_repository:
        repo: "deb [arch=amd64 signed-by=/usr/share/keyrings/brave-browser-archive-keyring.gpg] https://brave-browser-apt-release.s3.brave.com/ stable main"
        filename: brave-browser-release
        state: present

    - name: Download Oracle VirtualBox GPG key (dearmored)
      ansible.builtin.shell: |
        set -o pipefail
        wget -qO- https://www.virtualbox.org/download/oracle_vbox_2016.asc | gpg --dearmor --yes --output /usr/share/keyrings/oracle-virtualbox-2016.gpg
      args:
        executable: /bin/bash
        creates: /usr/share/keyrings/oracle-virtualbox-2016.gpg

    - name: Add Oracle VirtualBox repository
      ansible.builtin.apt_repository:
        repo: "deb [arch=amd64 signed-by=/usr/share/keyrings/oracle-virtualbox-2016.gpg] https://download.virtualbox.org/virtualbox/debian {{ ansible_distribution_release }} contrib"
        filename: virtualbox
        state: present

    # 3) PACKAGES
    - name: Update apt cache and install core packages
      ansible.builtin.apt:
        name:
          - xrdp
          - xfce4
          - xfce4-goodies
          - build-essential
          - dkms
          - linux-image-generic
          - linux-headers-generic
          - "virtualbox-{{ virtualbox_version }}"
          - brave-browser
          - ufw
          - fail2ban
        state: present
        update_cache: true

    # - name: Purge incompatible kernel line (current kernel as of 02FEB2026) 
    #   ansible.builtin.apt:
    #     name:
    #       - 'linux-image-6.17.*'
    #       - 'linux-headers-6.17.*'
    #       - 'linux-modules-6.17.*'
    #     state: absent
    #     purge: true
    #   notify: update grub

    # 4) GRUB BASELINE (safe defaults; manual kernel pinning can be done post-boot validation)
    - name: Configure GRUB defaults
      ansible.builtin.lineinfile:
        path: /etc/default/grub
        regexp: "^{{ item.key }}="
        line: "{{ item.key }}={{ item.value }}"
      loop:
        - { key: "GRUB_DEFAULT", value: "saved" }
        - { key: "GRUB_SAVEDEFAULT", value: "true" }
        - { key: "GRUB_TIMEOUT", value: "5" }
      notify: update grub

    # 5) BRAVE DESKTOP ENTRY
    - name: Set Brave password store arg in desktop launcher
      ansible.builtin.lineinfile:
        path: /usr/share/applications/brave-browser.desktop
        regexp: '^Exec=/usr/bin/brave-browser-stable.*'
        line: 'Exec=/usr/bin/brave-browser-stable --password-store=basic %U'

    # 6) SHARED DIRECTORY
    - name: Create shared directory for ISOs and lab files
      ansible.builtin.file:
        path: /opt/shared_lab_files
        state: directory
        owner: root
        group: sudo
        mode: "0775"

    # 7) SKELETON PROFILE + XRDP/XFCE DEFAULTS
    - name: Copy CPUT wallpaper
      ansible.builtin.copy:
        src: cputwallpaper.png
        dest: /usr/share/backgrounds/cputwallpaper.png
        owner: root
        group: root
        mode: "0644"

    - name: Ensure /etc/skel/.config exists
      ansible.builtin.file:
        path: /etc/skel/.config
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Copy XFCE config to /etc/skel
      ansible.builtin.copy:
        src: xfce4/
        dest: /etc/skel/.config/xfce4/
        owner: root
        group: root
        mode: "0755"
        directory_mode: "0755"

    - name: Copy .xsession to /etc/skel
      ansible.builtin.copy:
        src: .xsession
        dest: /etc/skel/.xsession
        owner: root
        group: root
        mode: "0644"

    - name: Ensure /etc/skel/Desktop exists
      ansible.builtin.file:
        path: /etc/skel/Desktop
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Pin Brave browser to desktop
      ansible.builtin.copy:
        src: /usr/share/applications/brave-browser.desktop
        dest: /etc/skel/Desktop/brave-browser.desktop
        remote_src: true
        owner: root
        group: root
        mode: "0755"

    - name: Pin VirtualBox to desktop
      ansible.builtin.copy:
        src: /usr/share/applications/virtualbox.desktop
        dest: /etc/skel/Desktop/virtualbox.desktop
        remote_src: true
        owner: root
        group: root
        mode: "0755"

    - name: Pin shared folder to desktop
      ansible.builtin.file:
        src: /opt/shared_lab_files
        dest: /etc/skel/Desktop/Shared_Lab_Files
        state: link

    # 8) MANAGEMENT TOOL
    - name: Install lab manager CLI
      ansible.builtin.copy:
        src: manage_lab_users.sh
        dest: /usr/local/bin/manage_lab_users
        owner: root
        group: root
        mode: "0755"

    # 9) SECURITY BASELINE
    - name: Allow SSH and XRDP via UFW
      community.general.ufw:
        rule: allow
        port: "{{ item }}"
        proto: tcp
      loop: "{{ allowed_tcp_ports }}"

    - name: Enable UFW (deny incoming by default)
      community.general.ufw:
        state: enabled
        policy: deny

    - name: Configure Fail2ban for SSH
      ansible.builtin.copy:
        dest: /etc/fail2ban/jail.local
        owner: root
        group: root
        mode: "0644"
        content: |
          [sshd]
          enabled = true
          port = ssh
          filter = sshd
          logpath = /var/log/auth.log
          maxretry = 5
          bantime = 3600
      notify: restart fail2ban

  handlers:
    - name: update grub
      ansible.builtin.command: update-grub
      changed_when: true

    - name: restart fail2ban
      ansible.builtin.service:
        name: fail2ban
        state: restarted
